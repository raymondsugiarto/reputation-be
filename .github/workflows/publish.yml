# ----------------------------------------------------------------------------
# Publish — build & push container image to ghcr.io
# ----------------------------------------------------------------------------
# Triggers:
#   * push to main/master        -> branch-<sha> + latest
#   * semver tag push (vX.Y.Z)   -> X.Y.Z + (latest if highest semver) +
#                                   X.Y.Z-<sha>
#   * pull_request               -> build only, nothing pushed
#   * workflow_dispatch          -> sha-<sha>  (ad-hoc builds)
#
# Image naming: ghcr.io/${{ github.repository_owner }}/reputation-be
# Uses the built-in GITHUB_TOKEN — no extra secret required.
# ----------------------------------------------------------------------------

name: publish

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: true
        default: main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reputation-be

jobs:
  build-and-push:
    # No `if:` guard here. The previous guard
    # `github.event.workflow_run.conclusion == 'success'` was a leftover
    # from a `workflow_run`-trigger template and is **always false** on a
    # plain `push` event (where `github.event.workflow_run` is null).
    # That made the job skip on every push to main, and consequently the
    # `deploy` job downstream was also skipped (because it `needs:
    # build-and-push`). The 0-second, grey-circle runs in the Actions
    # UI were the visible symptom.
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build context
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # is_highest_semver <ver>
          # Compares a X.Y.Z triple against every existing semver tag in
          # the repo via `git tag --list`. Returns 0 iff `<ver>` is greater
          # than every other tag, otherwise 1.
          is_highest_semver() {
            local candidate="$1"
            if ! [[ "$candidate" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              return 1
            fi
            local highest="0.0.0"
            while IFS= read -r t; do
              t="${t#v}"
              [[ "$t" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
              local max
              max=$(printf "%s\n%s\n" "$highest" "$t" | sort -V | tail -1)
              highest="$max"
            done < <(git tag --list 'v*.*.*')
            [[ "$candidate" == "$highest" ]]
          }

          ref="${{ github.ref }}"
          ref_type="${{ github.ref_type }}"
          event_name="${{ github.event_name }}"

          if [ "$event_name" = "workflow_dispatch" ]; then
            ref="refs/heads/${{ inputs.ref }}"
            ref_type="branch"
          fi

          sha="${{ github.sha }}"
          short_sha="${sha::7}"

          echo "ref=$ref"
          echo "ref_type=$ref_type"
          echo "sha=$sha"
          echo "short_sha=$short_sha"

          # ---- Tag derivation ----
          #   branch push            -> ["<branch>-<sha>"] + "latest" if main/master
          #   PR                     -> []   (build only)
          #   tag push vX.Y.Z        -> ["X.Y.Z", "$ver-$short_sha"] + "latest" if highest
          #   workflow_dispatch      -> ["sha-<sha>"]
          case "$ref_type:$event_name" in
            branch:push)
              branch="${ref#refs/heads/}"
              tags=("$branch-$short_sha")
              if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
                tags+=("latest")
              fi
              ;;
            tag:push)
              ver="${ref#refs/tags/v}"
              tags=("$ver")
              if is_highest_semver "$ver"; then
                tags+=("latest")
              fi
              tags+=("$ver-$short_sha")
              ;;
            pull_request:*) tags=() ;;
            branch:workflow_dispatch)
              tags=("sha-$short_sha")
              ;;
            *) tags=("sha-$short_sha") ;;
          esac

          printf 'tags=%s\n' "${tags[*]}" | sed 's/ /,/g' >> "$GITHUB_OUTPUT"

          if [ "$event_name" = "pull_request" ]; then
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tags_list=${tags[*]:-}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.meta.outputs.is_pr != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Provenance + SBOM)
        if: steps.meta.outputs.is_pr != 'true'
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build (and push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.meta.outputs.is_pr != 'true' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          # Cache intermediates so the Go module download layer (which is
          # the slowest layer across rebuilds) doesn't re-run on every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # When building a PR, still load the image locally so the step
          # summary can show what *would* have been pushed.
          load: ${{ steps.meta.outputs.is_pr == 'true' }}

      - name: Summary
        if: always()
        run: |
          {
            echo "### 📦 reputation-be container build"
            echo
            echo "- Trigger: \`${{ github.event_name }}\` (ref: \`${{ github.ref }}\`)"
            echo "- Commit: \`${{ github.sha }}\`"
            if [ "${{ steps.meta.outputs.is_pr }}" = "true" ]; then
              echo "- Mode: **PR build only** (registry push skipped)"
            fi
            echo "- Tags applied: \`${{ steps.meta.outputs.tags_list || '(none)' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
  deploy:
    needs: build-and-push
    if: |
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Expose Portainer secrets as real bash env vars so step scripts can
    # reference them by name (e.g. `$PORTAINER_URL`) instead of inlining
    # `${{ secrets.* }}` everywhere — which also helps the secret
    # validation logic below (`[ -z "$PORTAINER_URL" ]`) work directly.
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
      PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
      PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
      PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate Portainer
        id: auth
        run: |
          # Validate secrets up front so a misconfiguration fails with a
          # clear `::error::` instead of producing a confusing 4xx from
          # Portainer (or worse, an empty Authorization header).
          for v in PORTAINER_URL PORTAINER_USERNAME PORTAINER_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::secret '$v' is empty or undefined"
              exit 1
            fi
          done

          # Build the login payload as a real JSON object via jq so we
          # never have to hand-quote JSON through bash. `--arg` is safe
          # for arbitrary input: it stores the value verbatim, escaping
          # is handled by jq on serialisation.
          jq -n \
            --arg u "$PORTAINER_USERNAME" \
            --arg p "$PORTAINER_PASSWORD" \
            '{username: $u, password: $p}' > /tmp/portainer-auth.json
          # Use --fail-with-body so HTTP 4xx/5xx still print the response
          # body to stderr before exiting non-zero.
          HTTP_RESPONSE=$(curl -sk -w '\n%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/portainer-auth.json \
            "$PORTAINER_URL/api/auth")
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          rm -f /tmp/portainer-auth.json
          TOKEN=$(echo "$HTTP_BODY" | jq -r '.jwt // empty')
          if [ "$HTTP_CODE" != "200" ] || [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Portainer auth failed (HTTP $HTTP_CODE): $HTTP_BODY"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Read compose
        id: compose
        run: |
          # Sanity-check that docker-compose.yml exists in the checkout.
          # The deploy job ran `actions/checkout@v4`, so this should
          # always be present, but a missing file would otherwise fail
          # later with a less helpful "jq: 1 compile error".
          if [ ! -f docker-compose.yml ]; then
            echo "::error::docker-compose.yml not found at repo root"
            exit 1
          fi
          # Copy the raw compose file to a path outside the workspace.
          # We pass the *path* between steps (via $GITHUB_OUTPUT) rather
          # than the file's content — that way the docker-compose.yml
          # text never has to cross a bash/jq/GitHub-Actions expression
          # boundary, which is the only reliable way to handle content
          # that may contain quotes, newlines, $, backticks, etc.
          #
          # $RUNNER_TEMP is cleaned up automatically at job end, so we
          # don't leak files between runs.
          cp docker-compose.yml "$RUNNER_TEMP/portainer-compose.yml"
          # $GITHUB_OUTPUT accepts `key=value` lines, one per output.
          echo "compose_path=$RUNNER_TEMP/portainer-compose.yml" >> "$GITHUB_OUTPUT"
      - name: Redeploy
        run: |
          # Validate the stack-id / endpoint-id secrets up front. A
          # missing PORTAINER_STACK_ID previously produced a request URL
          # like `/api/stacks/?endpointId=…`, which Portainer answers
          # with a generic 4xx and no hint about which secret is wrong.
          if [ -z "$PORTAINER_STACK_ID" ]; then
            echo "::error::secret 'PORTAINER_STACK_ID' is empty or undefined"
            exit 1
          fi
          if [ -z "$PORTAINER_ENDPOINT_ID" ]; then
            echo "::error::secret 'PORTAINER_ENDPOINT_ID' is empty or undefined"
            exit 1
          fi

          # Resolve the compose file path. ${{ steps.compose.outputs.compose_path }}
          # is a short string (no newlines, no quotes) so direct bash
          # interpolation is safe.
          COMPOSE_PATH="${{ steps.compose.outputs.compose_path }}"
          if [ ! -f "$COMPOSE_PATH" ]; then
            echo "::error::compose file not found at $COMPOSE_PATH"
            exit 1
          fi

          # `--rawfile compose PATH` reads the file as a single string
          # on the jq side. The docker-compose.yml content never has to
          # cross bash as text, so its quotes / newlines / $ / backticks
          # are harmless. (`--slurpfile` would also slurp the file but
          # parses it as JSON, which docker-compose.yml is not.)
          jq -n \
            --rawfile compose "$COMPOSE_PATH" \
            --argjson prune   false \
            --argjson pull    true \
            --argjson repull  true \
            --argjson env     [] \
            '{
              StackFileContent:        $compose,
              Env:                     $env,
              Prune:                   $prune,
              PullImage:               $pull,
              RepullImageAndRedeploy:   $repull
            }' > /tmp/portainer-redeploy.json

          # Sanity check before hitting the API.
          test -s /tmp/portainer-redeploy.json

          # `set -x` would leak the JWT and the entire stack body into the
          # log; deliberately keep this step quiet.
          #
          # `-k` (--insecure) accepts Portainer's self-signed TLS cert.
          # Portainer 2.x ships a self-signed cert by default; the
          # alternatives are (a) baking the CA into a workflow secret and
          # using --cacert, or (b) switching PORTAINER_URL to http://. We
          # accept the self-signed because Portainer is only reachable
          # from the GitHub runner over a private network in this setup.
          curl -fsSk -X PUT \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/portainer-redeploy.json \
            "${{ secrets.PORTAINER_URL }}/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID"
          # curl already exited non-zero on HTTP >=400, but Portainer can
          # return 200 with an error envelope. We don't parse it here
          # (kept simple); the next deploy will surface any drift.
          rm -f /tmp/portainer-redeploy.json
