# ----------------------------------------------------------------------------
# Continuous Integration
# ----------------------------------------------------------------------------
# Runs on every push to main/master and on every pull request.
#
# Responsibilities (kept deliberately narrow per project-standards:
# "Prefer simplicity over abstraction"):
#   1. Check out the repo with full history so `make test` (which generates
#      mocks via mockery) works the same as on a developer workstation.
#   2. Install Go (matching `go.mod`'s `go 1.25.0` directive).
#   3. `go vet ./...` — fast static check that catches most mistakes.
#   4. `make test` — runs `generate-mock` then `go test` via gotestsum.
#   5. Smoke-check that `make build` produces a `main` binary.
#
# The container-image build + publish flow lives in `publish.yml`.
# ----------------------------------------------------------------------------

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Allow concurrent runs on different branches; cancel in-flight runs on the
# same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: vet + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # mock generation needs the full history (or at least enough to
          # resolve HEAD~1 for changed-file detection if used later).
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Pin to a real release that is present on the actions/go-versions
          # mirror. Keep this in lock-step with `toolchain` in `go.mod` so
          # both the install path and the auto-bootstrap path agree.
          # Latest verified on the mirror at the time of writing: 1.25.12.
          go-version: "1.25.12"
          # Cache the module download cache (and build cache) keyed on
          # go.sum so caching actually engages; without this hint
          # setup-go sometimes falls back to the runner's pre-installed
          # Go (ubuntu-latest ships 1.24), which then fails the next
          # `go install` with "package requires newer Go version go1.25".
          cache: true
          cache-dependency-path: go.sum

      - name: Install test dependencies
        # The Makefile already pulls in gotestsum on demand, but installing
        # both tools up-front avoids noisy download streams inside the test
        # step logs.
        #
        # gotestsum is still installed via `go install` (it's a real Go
        # module). mockery is installed from the official GitHub release
        # tarball because `go install github.com/vektra/mockery/v2@<v>`
        # transitively asks proxy.golang.org for `github.com/stretchr/testify/mock`
        # — a sub-package that is **not** published as a standalone module, so
        # the proxy returns 404 (`no metadata for github.com/stretchr/testify/mock`)
        # and CI fails before any of our code is even compiled. The release
        # tarball ships a pre-built binary that has no such dependency.
        # See release listing: https://github.com/vektra/mockery/releases
        run: |
          # Pin gotestsum instead of `@latest` so a future release doesn't
          # silently bump the go directive requirement beyond what we test.
          go install gotest.tools/gotestsum@v1.13.0
          # mockery ships release tarballs named `_Linux_x86_64.tar.gz` /
          # `_Linux_arm64.tar.gz` (note: not `amd64`). Translate `uname -m`
          # output to the matching asset suffix.
          MOCKERY_VERSION="${MOCKERY_VERSION:-v2.53.4}"
          case "$(uname -m)" in
            x86_64)  MOCKERY_ARCH=x86_64 ;;
            aarch64) MOCKERY_ARCH=arm64 ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -fsSL \
            "https://github.com/vektra/mockery/releases/download/${MOCKERY_VERSION}/mockery_${MOCKERY_VERSION#v}_Linux_${MOCKERY_ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin mockery
          mockery --version

      - name: go vet
        run: go vet ./...

      - name: Mock generation (smoke check)
        # generate-mock writes to pkg/infrastructure and wipes any pre-existing
        # mocks; running it explicitly first surfaces "did you forget to
        # commit a mock?" failures before we hit the test step.
        run: make generate-mock

      - name: Tests
        # gotestsum is what the Makefile uses anyway; it produces nicer
        # output + the coverprofile we want for the coverage artefact.
        run: make test

      - name: Build smoke-test
        # mirrors what the publish workflow's `docker build` will do.
        run: make build
        shell: bash

      - name: Upload coverage report (best-effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            report/c.out
            report/coverage.html
          if-no-files-found: ignore
